[tool.black]
line-length = 120
target-version = ["py311"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "T20",  # flake8-print
]
ignore = ["E501"]  # handled by black

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"src/ui/*.py" = ["N802"]  # Qt override methods use CamelCase (paintEvent, mousePressEvent, etc.)

[tool.mypy]
strict = true
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true

[[tool.mypy.overrides]]
module = "sounddevice"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "rtmidi"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "mido"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "music21"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
